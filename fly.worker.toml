# RealBench Worker - Fly.io Configuration
app = "realbench-worker"
primary_region = "fra"

[build]
  dockerfile = "docker/Dockerfile.worker"
  context = "."

# Worker needs no HTTP service, just runs continuously
[processes]
  app = "node dist/workers/profiling-worker.js"

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2

[mounts]
  source = "realbench_tmp"
  destination = "/tmp"
  size_gb = 20

[experimental]
  privileged = true

[env]
  NODE_ENV = "production"

# Secrets (set via: fly secrets set -a realbench-worker KEY=VALUE)
# DATABASE_URL
# R2_ACCOUNT_ID
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_BUCKET_NAME
# ANTHROPIC_API_KEY
