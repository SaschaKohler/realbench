# RealBench Profiling — GitHub Action Template
#
# Copy this file into your own repository at:
#   .github/workflows/realbench.yml
#
# Required secrets (set under Settings → Secrets and variables → Actions):
#   REALBENCH_API_KEY  — your RealBench API key (from https://app.realbench.dev/settings)
#   REALBENCH_PROJECT_ID — your RealBench project UUID

name: RealBench Profiling

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  profile:
    name: Profile & Analyse
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build your project ────────────────────────────────────────────────
      # Replace this section with your own build steps.
      # The binary must be compiled with debug symbols for best results:
      #   C++  → add  -g -O2  (or use CMAKE_BUILD_TYPE=RelWithDebInfo)
      #   Rust → use  cargo build --release  (debug info included by default)
      #   Go   → use  go build  (no extra flags needed)

      - name: Build (example — adapt to your project)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel

      # ── Upload to RealBench ───────────────────────────────────────────────
      - name: Upload binary to RealBench
        id: realbench
        env:
          REALBENCH_API_KEY: ${{ secrets.REALBENCH_API_KEY }}
          REALBENCH_PROJECT_ID: ${{ secrets.REALBENCH_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Detect PR number (empty for push events)
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Path to your compiled binary — adjust this!
          BINARY_PATH="build/my_binary"

          RESPONSE=$(curl -sf \
            -F "binary=@${BINARY_PATH}" \
            -F "projectId=${REALBENCH_PROJECT_ID}" \
            -F "commitSha=${{ github.sha }}" \
            -F "branch=${{ github.head_ref || github.ref_name }}" \
            -F "buildType=auto" \
            -F "githubRepo=${{ github.repository }}" \
            ${PR_NUMBER:+-F "githubPrNumber=${PR_NUMBER}"} \
            ${PR_NUMBER:+-F "githubToken=${GITHUB_TOKEN}"} \
            -H "Authorization: Bearer ${REALBENCH_API_KEY}" \
            "${REALBENCH_API_URL:-https://api.realbench.dev}/api/v1/profile")

          echo "response=${RESPONSE}" >> "$GITHUB_OUTPUT"
          RUN_ID=$(echo "${RESPONSE}" | jq -r '.runId')
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ RealBench run enqueued: ${RUN_ID}"

      # ── Wait for result (optional — remove if you don't want blocking CI) ─
      - name: Wait for profiling result
        if: steps.realbench.outputs.run_id != ''
        env:
          REALBENCH_API_KEY: ${{ secrets.REALBENCH_API_KEY }}
        run: |
          RUN_ID="${{ steps.realbench.outputs.run_id }}"
          echo "Polling run ${RUN_ID}..."

          for i in $(seq 1 30); do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer ${REALBENCH_API_KEY}" \
              "${REALBENCH_API_URL:-https://api.realbench.dev}/api/v1/runs/${RUN_ID}" \
              | jq -r '.run.status')

            echo "  attempt ${i}: status=${STATUS}"

            if [ "${STATUS}" = "done" ]; then
              echo "✅ Profiling complete."
              exit 0
            elif [ "${STATUS}" = "failed" ]; then
              echo "❌ Profiling failed."
              exit 1
            fi

            sleep 10
          done

          echo "⏳ Timed out waiting for profiling result (run still in progress)."
